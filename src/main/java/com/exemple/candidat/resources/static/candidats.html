<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Candidats - EvalSys</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <div class="background-orbs">
        <div class="orb orb-1" style="background: #8b5cf6;"></div>
        <div class="orb orb-2" style="background: #10b981;"></div>
        <div class="orb orb-3" style="background: #3b82f6;"></div>
    </div>

    <main class="dashboard glass-panel">
        <header class="dashboard-header" style="border-bottom: none; padding-bottom: 0;">
            <div>
                <h1 class="logo-text">Eval<span>Sys</span></h1>
                <p class="subtitle">Gestion des Candidats (CRUD)</p>
            </div>
            <div class="header-actions" style="display: flex; gap: 15px;">
                <a href="index.html" class="secondary-btn" style="text-decoration: none; padding: 12px 24px; border-radius: 12px; background: rgba(255,255,255,0.1); color: white; display: flex; align-items: center; gap: 8px; transition: all 0.3s; font-family: 'Inter';">
                    <i class="fas fa-arrow-left"></i> Retour
                </a>
                <a href="correcteurs.html" class="secondary-btn" style="text-decoration: none; padding: 12px 24px; border-radius: 12px; background: rgba(255,255,255,0.1); color: white; display: flex; align-items: center; gap: 8px; transition: all 0.3s; font-family: 'Inter';">
                    <i class="fas fa-chalkboard-teacher"></i> Correcteurs
                </a>
                <button id="addBtn" class="primary-btn"><i class="fas fa-plus"></i> Nouveau</button>
            </div>
        </header>

        <!-- Loader State -->
        <div id="loader" class="state-container hidden" style="margin-top: 2rem;">
            <div class="spinner"></div>
            <p>Chargement des candidats...</p>
        </div>

        <!-- Data Grid -->
        <div class="results-board" id="resultsBoard" style="margin-top: 1rem;">
            <div class="table-container">
                <table class="glass-table w-100">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Matricule</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="candidatsTableBody">
                        <!-- Lignes injectées par JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Form (Glass CSS) -->
    <div id="candidatModal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <h2 id="modalTitle" style="margin-bottom: 20px;">Ajouter un Candidat</h2>
            <form id="candidatForm">
                <input type="hidden" id="candidatId">
                
                <div class="input-group">
                    <label>Matricule</label>
                    <input type="text" id="matriculeInput" required placeholder="CANDXXX">
                </div>
                
                <div class="input-group">
                    <label>Nom</label>
                    <input type="text" id="nomInput" required placeholder="Doe">
                </div>
                
                <div class="input-group">
                    <label>Prénom</label>
                    <input type="text" id="prenomInput" required placeholder="John">
                </div>
                
                <div class="modal-actions" style="display: flex; gap: 10px; margin-top: 30px; justify-content: flex-end;">
                    <button type="button" id="cancelBtn" class="secondary-btn" style="padding: 10px 20px; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; border: none; cursor: pointer;">Annuler</button>
                    <button type="submit" id="saveBtn" class="primary-btn" style="padding: 10px 20px; border-radius: 8px;">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom CSS added directly for specific generic extensions not in style.css yet -->
    <style>
        .glass-table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
        }
        .glass-table th, .glass-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .glass-table th {
            font-family: 'Outfit';
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .glass-table tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
            transition: background-color 0.2s;
        }
        
        /* Action Buttons */
        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-left: 10px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .icon-btn:hover {
            transform: scale(1.1);
        }
        .edit-btn:hover { color: var(--accent-blue); }
        .delete-btn:hover { color: var(--danger); }
        .grade-btn:hover { color: var(--success); }

        /* Modal styling */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            opacity: 1; transition: opacity 0.3s ease;
        }
        .modal-overlay.hidden {
            opacity: 0; pointer-events: none;
        }
        .modal-content {
            width: 90%; max-width: 500px;
            padding: 30px; border-radius: 20px;
            transform: translateY(0); transition: transform 0.3s ease;
        }
        .modal-overlay.hidden .modal-content {
            transform: translateY(50px);
        }
        .input-group {
            margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px;
        }
        .input-group label {
            font-size: 0.9rem; color: var(--text-muted); font-weight: 500;
        }
        .input-group input {
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--card-border);
            color: white; padding: 12px; border-radius: 8px; font-family: 'Inter'; width: 100%;
            outline: none; transition: var(--transition);
        }
        .input-group input:focus {
            border-color: var(--accent-blue); box-shadow: 0 0 10px var(--accent-glow);
        }
        .secondary-btn:hover { background: rgba(255,255,255,0.2) !important; }
    </style>

    <script src="candidats.js"></script>
</body>
</html>
